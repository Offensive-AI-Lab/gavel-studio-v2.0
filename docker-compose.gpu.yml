# GPU override — gives the backend container access to your NVIDIA GPU so
# LOCAL training runs on the GPU instead of the CPU. (Cluster/SLURM training
# doesn't need this — the compute happens remotely.)
#
# Prerequisites on the HOST:
#   * NVIDIA GPU + driver
#   * nvidia-container-toolkit installed and Docker configured for it
#     (https://docs.nvidia.com/datacenter/cloud-native/container-toolkit/)
#   Linux is the supported path; GPU passthrough is not available on Docker
#   Desktop for macOS, and on Windows needs WSL2 + a CUDA-on-WSL driver.
#
# Use it by layering this file on top of the base compose:
#   docker compose -f docker-compose.yml -f docker-compose.gpu.yml up --build
#
# Without this file, `docker compose up` trains on CPU (still fully functional,
# just slower).
services:
  backend:
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
