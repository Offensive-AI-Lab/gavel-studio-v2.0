# Single-command bring-up for the WHOLE stack (the alternative to ./run.sh).
#
# ONE env file for everything: backend/.env. Point compose at it with
# --env-file so its ${VAR} interpolation (JWT_SECRET_KEY, HF_TOKEN,
# SLURM_SSH_KEY_FILE) comes from that same file — there is NO repo-root .env.
#
#   docker compose --env-file backend/.env up --build
#
#   docker compose --env-file backend/.env up       — foreground, all logs
#   docker compose --env-file backend/.env up -d    — detached
#   docker compose down                              — stop everything
#   docker compose down -v                           — stop AND wipe the pg volume
#
# Tip: `export COMPOSE_ENV_FILES=backend/.env` once and you can drop the flag.
#
# Open http://localhost:5173 when it's up, register a user, and log in.
#
# Services & ports (host → container):
#   frontend  5173   Vite dev server (browser entry point)
#   backend   8000   FastAPI — rules, training, evaluation, AI pipeline
#   postgres  —      pgvector/pg17, internal only (holds gavel_db)
#
# How the pieces talk (inside Docker's network, by service name via DNS):
#   browser → localhost:5173 (frontend) and localhost:8000 (backend)
#   backend → postgres:5432  and  → the REMOTE central server (CENTRAL_SERVER_URL)
# The central server runs elsewhere (central-server/docker-compose.yml), not here.
#
# Config: everything works out-of-the-box with built-in defaults. To enable
# AI generation / HF publishing, fill the values in backend/.env; compose
# substitutes ${VAR} from that SAME file (via --env-file backend/.env).
# (Native dev also uses backend/.env — see ./run.sh. One file, both modes.)
#
# This stack = postgres + backend + frontend ONLY. It connects to a REMOTE
# central server (auth/community); set its URL in backend/.env (CENTRAL_SERVER_URL).
# The central server is a SEPARATE, isolated deployment — see
# central-server/docker-compose.yml. It is NOT started by this file.
#
# Run modes (all driven by backend/.env, no compose edits needed):
#   * Default:                        docker compose --env-file backend/.env up --build
#   * Train on the SLURM cluster:     run cluster/setup_local.sh (writes SLURM_*
#                                     into backend/.env; no local GPU needed)
#   * Train on a LOCAL GPU:           add the GPU override —
#       docker compose --env-file backend/.env -f docker-compose.yml -f docker-compose.gpu.yml up --build
#   * Train on local CPU:             the default (nothing to set)

services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: gavel-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gavel_db
    volumes:
      - gavel_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    # Internal-only. To inspect with a GUI from the host, uncomment:
    #   ports:
    #     - "5432:5432"

  # NB: there is NO central server here. This stack runs each user's LOCAL
  # backend + frontend, which connect to a REMOTE central server over the
  # network (CENTRAL_SERVER_URL in backend/.env). The central server is a
  # separate, isolated deployment — see central-server/docker-compose.yml.

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gavel-backend
    depends_on:
      postgres:
        condition: service_healthy
      # NB: no hard dependency on `central` — the backend only calls it at
      # login, not at boot. That lets you point CENTRAL_SERVER_URL at a REMOTE
      # central and skip the local one entirely:
      #   docker compose up postgres backend frontend
    # ── Config: ONE source of truth = backend/.env ──────────────────────────
    # backend/.env is bind-mounted at /app/.env (see volumes) and loaded by the
    # backend's load_dotenv. load_dotenv does NOT override variables that are
    # already set, so the handful of CONTAINER-ONLY values in `environment:`
    # below win, and EVERYTHING ELSE (OPENAI_API_KEY, CENTRAL_SERVER_URL,
    # JWT_SECRET_KEY, SLURM_HOST, SLURM_USER, the optional SLURM_* tuning, ...)
    # comes from backend/.env. So you edit ONE file — backend/.env — whether you
    # run with Docker or natively. There is no separate repo-root app config.
    environment:
      # DB — must point at the postgres SERVICE, not backend/.env's 127.0.0.1.
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: gavel_db
      # CORS / frontend (browser hits the host-mapped ports).
      ALLOWED_ORIGINS: http://localhost:5173
      FRONTEND_URL: http://localhost:5173
      # The host SSH key is bind-mounted read-only at /run/secrets/slurm_key and
      # copied to this root-owned chmod-600 path by the start command (ssh
      # refuses a key it doesn't own / that others can read). Native instead
      # uses the SLURM_SSH_KEY *path* from backend/.env directly.
      # NB: the host key path for the mount is resolved by compose BEFORE the
      # container starts, so it comes from --env-file backend/.env (not the
      # in-container /app/.env). cluster/setup_local.sh writes SLURM_SSH_KEY_FILE
      # into backend/.env for exactly this — same one file, no repo-root .env.
      SLURM_SSH_KEY: /tmp/cluster_key
    ports:
      - "8000:8000"
    volumes:
      # Mount source so uvicorn --reload picks up edits without a rebuild.
      # Anonymous volumes keep container-only scratch out of the working tree.
      - ./backend:/app
      - /app/__pycache__
      - /app/.venv
      # Cluster SSH key (read-only). Defaults to /dev/null when unset, which is
      # inert because SLURM stays disabled without SLURM_HOST/USER. The key
      # must be chmod 600 on the host.
      - ${SLURM_SSH_KEY_FILE:-/dev/null}:/run/secrets/slurm_key:ro
    # Copy the mounted cluster key to a root-owned chmod-600 path (ssh rejects
    # keys it doesn't own / that others can read) before starting the server.
    command: sh -c "if [ -s /run/secrets/slurm_key ]; then cp /run/secrets/slurm_key /tmp/cluster_key && chmod 600 /tmp/cluster_key; fi; uvicorn main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gavel-frontend
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:8000
      # Reliable file-watching through the Docker bind mount (esp. Win/WSL2).
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0

# Named volume — survives `docker compose down`. Wiped only on `down -v`.
volumes:
  gavel_pgdata:
