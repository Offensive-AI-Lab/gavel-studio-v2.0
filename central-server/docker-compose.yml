# Isolated, self-contained stack for the GAVEL CENTRAL SERVER.
#
# This is the SHARED auth / community / HF-publish server. You deploy it ONCE
# (on a VM, your own box, Render, …) and every user's local backend connects to
# it over the network via CENTRAL_SERVER_URL. It is deliberately SEPARATE from
# the repo-root docker-compose.yml (which runs each user's local
# backend + frontend + postgres) — different machine, different lifecycle.
#
#   cd central-server
#   cp .env.example .env          # set JWT_SECRET_KEY + HF_TOKEN (see below)
#   docker compose up --build
#
# Serves on http://localhost:8001 — put a TLS reverse proxy (nginx/Caddy) in
# front of it for anything internet-facing.
#
# Config comes from central-server/.env:
#   * JWT_SECRET_KEY  (required) — the signing secret for the tokens this server
#                                  issues. Generate one:
#                                  python -c "import secrets; print(secrets.token_urlsafe(48))"
#   * HF_TOKEN        (optional) — write-scope HF token, only to allow publishing.
#   * ALLOWED_ORIGINS (optional) — CORS allowlist.
# DATABASE_URL from .env is IGNORED here — this compose points the server at its
# own bundled postgres below, so the stack is fully self-contained.

services:
  central-postgres:
    image: postgres:17            # central only needs citext (bundled in contrib)
    container_name: gavel-central-postgres
    restart: unless-stopped       # auto-restart on crash AND on host reboot
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: gavel_central
    volumes:
      - gavel_central_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    # Internal-only by default. To inspect from the host, uncomment:
    #   ports:
    #     - "5433:5432"

  central:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gavel-central
    restart: unless-stopped       # auto-restart on crash AND on host reboot
    depends_on:
      central-postgres:
        condition: service_healthy
    # JWT_SECRET_KEY / HF_TOKEN / ALLOWED_ORIGINS come from central-server/.env;
    # DATABASE_URL is forced to the bundled postgres so the stack is isolated.
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@central-postgres:5432/gavel_central
    ports:
      - "${CENTRAL_PORT:-8001}:8001"
    # Create the DB + citext (idempotent — postgres already made gavel_central),
    # then serve. Production-style: runs the baked image, no source mount/reload.
    command: sh -c "python _create_db.py || true; uvicorn app.main:app --host 0.0.0.0 --port 8001"

volumes:
  gavel_central_pgdata:
