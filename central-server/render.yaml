# Render Blueprint for the GAVEL Central Server.
#
# This file describes the entire infrastructure: one Python web service and
# one PostgreSQL database, linked together. Drop the repo into Render's "New
# Blueprint" flow and Render reads this file to provision both resources.
#
# After deploy, set the following env vars in the Render dashboard (Environment
# tab on the web service):
#   * JWT_SECRET_KEY  — generate with `python -c "import secrets; print(secrets.token_urlsafe(48))"`
#   * HF_TOKEN        — write-scope HuggingFace token for the public registry
#   * ALLOWED_ORIGINS — comma-separated list of frontend URLs allowed to call this server
#
# DATABASE_URL is auto-injected by Render via the `fromDatabase` directive.

services:
  - type: web
    name: gavel-central-server
    runtime: python
    rootDir: central-server
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: gavel-central-db
          property: connectionString
      - key: JWT_SECRET_KEY
        sync: false
      - key: HF_TOKEN
        sync: false
      - key: HF_REPO_ID
        value: GavelPublicData/public-library
      - key: HF_REPO_TYPE
        value: dataset
      - key: ALLOWED_ORIGINS
        sync: false

databases:
  - name: gavel-central-db
    plan: free
    databaseName: gavel_central
    user: gavel
