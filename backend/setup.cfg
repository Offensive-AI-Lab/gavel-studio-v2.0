[mutmut]
# Modules to mutate. Kept tight on purpose: mutmut runs the whole test suite
# once per mutation, so each new file roughly doubles run time. Add modules
# here only when you specifically want a mutation audit on them.
paths_to_mutate=services/,utils/crash_recovery.py

# Test runner. -x stops at the first failure (we only need to know if any
# test catches the mutation). -q hides per-test output. The unit tests run
# first because they are fast; integration tests catch the rest.
runner=.venv\Scripts\python.exe -m pytest -x -q tests/unit/ tests/integration/

# Which tests do we treat as "the suite". Same path twice keeps mutmut from
# trying to be clever about test discovery.
tests_dir=tests/
