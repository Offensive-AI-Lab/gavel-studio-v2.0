[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --html=tests/report.html
    --self-contained-html
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    e2e: end-to-end tests
    unit: pure-logic tests (no DB / no HTTP). Run via `pytest tests/unit/`.
    integration: tests that hit the real DB or HTTP routes. Run via `pytest tests/integration/`.
